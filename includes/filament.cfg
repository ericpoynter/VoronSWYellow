[gcode_macro LOAD_FILAMENT]
gcode:     
     G91
     G1 E60 F300
     G1 E-1 F300
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
gcode:
     G91
     G1 E1 F1500    
     G1 E-80 F300
    RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro FILAMENT_CHANGE]
gcode:     
     PAUSE  
     _CG28
     G91
     G1 E 1 F1500
     G1 E-3.14 F1500
     G1 Z25
     G90
     G1 X220 Y1 F3000    
     SET_IDLE_TIMEOUT TMEOUT=7200    
     FILAMENT_UNLOAD
     
[gcode_macro FILAMENT_LOAD]
gcode:
      G91
      G1 E80 F300
      G1 E-1 F300
      G90
      
[gcode_macro FILAMENT_UNLOAD]
gcode:
     G91
     G1 E1 F1500    
     G1 E-80 F1500
     G90
     SPOOL_CLEAR_ACTIVE
     
[gcode_macro Inspect_Nozzle]
gcode: 
     PAUSE
     _CG28
     G90
     G1 X44 Y52 F3600