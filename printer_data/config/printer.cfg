#Raspberry Pi 3 Model B Plus Rev 1.3
#BTT SKR mini E3 v3.0
#STM32G0B1

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_240021000B50414733303120-if00 #USART2(PA3/PA2)
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

#mcu can placeholder
#####

[printer]
kinematics: corexz
max_velocity: 250
max_accel: 3000
max_z_velocity: 20
max_z_accel: 350
square_corner_velocity: 4.0

[include configs/*.cfg]
[include configs/KAMP/*.cfg]

## Client variable macro for your printer.cfg
[gcode_macro _CLIENT_VARIABLE]
